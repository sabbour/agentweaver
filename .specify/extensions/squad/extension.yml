schema_version: "1.0"

extension:
  id: "squad"
  name: "Squad Bridge"
  version: "1.3.0"
  description: "Bootstrap and synchronize a Squad agent team from your Speckit plan and tasks, with execution support."
  author: "jwill824"
  repository: "https://github.com/jwill824/spec-kit-squad"
  documentation: "https://github.com/jwill824/spec-kit-squad/blob/main/README.md"
  changelog: "https://github.com/jwill824/spec-kit-squad/blob/main/docs/CHANGELOG.md"
  license: "MIT"
  homepage: "https://github.com/jwill824/spec-kit-squad"

requires:
  speckit_version: ">=0.8.11"
  tools:
    - name: "@bradygaster/squad-cli"
      version: ">=0.9.4"
      required: true
  commands:
    - "speckit.specify"
    - "speckit.plan"
    - "speckit.tasks"

provides:
  commands:
    - name: "speckit.squad.init"
      file: "commands/init.md"
      description: "Initialize a Squad team from the implementation plan (tech-aware)"

    - name: "speckit.squad.generate"
      file: "commands/generate.md"
      description: "Re-generate Squad agent definitions as your plan evolves"

    - name: "speckit.squad.route"
      file: "commands/route.md"
      description: "Route open Speckit tasks to the right Squad agents"

    - name: "speckit.squad.status"
      file: "commands/status.md"
      description: "Show alignment between your spec, tasks, and squad"

    - name: "speckit.squad.run"
      file: "commands/run.md"
      description: "Execute routed tasks through Squad agent sessions"

  config:
    - name: "squad-config.yml"
      template: "squad-config.template.yml"
      description: "Squad bridge configuration"
      required: false

hooks:
  after_plan:
    command: "speckit.squad.generate"
    optional: true
    prompt: "Plan created/updated — generate Squad agents from technology choices?"
    description: >
      Reads the implementation plan to extract technology stack, architecture
      layers, and phases, then creates or updates Squad agents to match.
      Hooks into plan (not specify) because the spec is tech-agnostic while
      the plan contains concrete stack decisions needed for agent generation.

  after_tasks:
    command: "speckit.squad.route"
    optional: true
    prompt: "Tasks generated — route them to Squad agents?"
    description: "Distributes new tasks to the right agents automatically"

tags:
  - "multi-agent"
  - "agents"
  - "orchestration"
  - "process"
  - "integration"
  - "execution"

defaults:
  squad:
    auto_generate: false
    agent_model: "claude-sonnet-4"
    routing_strategy: "capability-match"
    execution:
      parallel_limit: 3
      auto_pr: false
      session_timeout_minutes: 30
      branch_pattern: "squad/{agent}/{task-id}"
      copilot_flags: "--yolo"
