openapi: 3.1.0
info:
  title: Scaffolder Run API
  version: 0.1.0
  description: API contract for single-agent file-editing runs.
servers:
  - url: http://localhost:3000
paths:
  /runs:
    post:
      summary: Create a run
      operationId: createRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRunRequest'
      responses:
        '201':
          description: Run created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '400':
          description: Invalid request
  /runs/{runId}:
    get:
      summary: Get run status
      operationId: getRun
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '404':
          description: Not found
  /runs/{runId}/stream:
    get:
      summary: Stream ordered run events (SSE)
      operationId: streamRunEvents
      description: >
        Server-Sent Events stream of the run's durable, append-only event log.
        Each SSE message's `id` field carries the per-run monotonic `sequence`,
        which doubles as the resumable cursor. To reconnect, the client sends the
        last sequence it processed via the standard `Last-Event-ID` request header
        (equivalently the `lastSeenSequence` query parameter); the server replays
        only events after that cursor - across process restarts while within the
        retention window - and then continues live. Delivery is at-least-once, so
        clients MUST deduplicate by per-run `sequence`. Each event body conforms to
        `run-step-event.schema.json` (RunEvent). The stream spans the full run
        lifecycle through merge, including review/merge events.
      parameters:
        - $ref: '#/components/parameters/RunId'
        - name: Last-Event-ID
          in: header
          required: false
          description: >
            Last per-run `sequence` the client has already processed. On reconnect,
            the server replays only events with a greater `sequence`.
          schema:
            type: integer
            minimum: 1
        - name: lastSeenSequence
          in: query
          required: false
          description: >
            Alternative to the `Last-Event-ID` header for environments that cannot
            set it. Same semantics: replay only events after this per-run sequence.
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: text/event-stream of RunEvent payloads (see run-step-event.schema.json)
          content:
            text/event-stream:
              schema:
                type: string
  /runs/{runId}/diff:
    get:
      summary: Get run diff output against originating branch
      operationId: getRunDiff
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Unified diff output
          content:
            text/plain:
              schema:
                type: string
        '409':
          description: Run not in state with available diff
  /runs/{runId}/review:
    post:
      summary: Submit human review decision
      operationId: submitReviewDecision
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewDecisionRequest'
      responses:
        '200':
          description: Decision accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '409':
          description: Invalid state transition

components:
  parameters:
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    ModelSource:
      type: string
      enum: [copilot_sdk, microsoft_foundry]

    RunStatus:
      type: string
      enum:
        - queued
        - running
        - completed
        - failed
        - bounded
        - awaiting_review
        - approved
        - declined
        - merged
        - merge_conflict

    CreateRunRequest:
      type: object
      required: [originatingBranch, modelSource, taskPrompt]
      properties:
        originatingBranch:
          type: string
          minLength: 1
        modelSource:
          $ref: '#/components/schemas/ModelSource'
        taskPrompt:
          type: string
          minLength: 1
        maxSteps:
          type: integer
          minimum: 1
          default: 200
        maxDurationSeconds:
          type: integer
          minimum: 1
          default: 1800

    Run:
      type: object
      required: [id, originatingBranch, modelSource, submittedBy, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        originatingBranch:
          type: string
        modelSource:
          $ref: '#/components/schemas/ModelSource'
        submittedBy:
          type: string
          description: >
            Identity of the user who submitted the run. The named human accountable
            for the run (FR-024). Derived from authentication context; preserved in
            the run's event log for the full retention window.
        status:
          $ref: '#/components/schemas/RunStatus'
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        sessionId:
          type: string
          format: uuid
          nullable: true

    ReviewDecisionRequest:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [approve, decline]
        comment:
          type: string
          maxLength: 4000
