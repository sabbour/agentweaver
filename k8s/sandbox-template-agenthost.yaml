# SandboxTemplate — agentweaver-agent-host (spec-018 P1.5, pod-per-run).
#
# This is the template reached through KubernetesSandboxOptions.AgentHostWarmPoolRef
# (default "agentweaver-agent-host"). KubernetesSandboxExecutor.LaunchAgentHostPodAsync
# creates a SandboxClaim with warmPoolRef=agentweaver-agent-host; the pod runs
# Agentweaver.AgentHost which hosts the A2ATurnBridgeAgent over A2A and the
# worker/api connects via RemoteAgentProxy.
#
# This supersedes the removed legacy sleep-infinity agentweaver-sandbox template/image.
#   - image: agentweaver-agent-host (the real AgentHost), NOT the old sleep-infinity image.
#   - envVarsInjectionPolicy: Allowed — the executor injects AgentHost__RunId etc.
#   - PoC: RequireMtls=false comes from the mounted configmap-agenthost (plain http :8088).
#   - PoC: readOnlyRootFilesystem relaxed to false (CopilotClient / git write to $HOME).
#     PRODUCTION must restore readOnlyRootFilesystem: true + a writable $HOME emptyDir.
#   - GitHub token (Option C / warm pool, workload identity): the pod runs as the dedicated
#     agentweaver-agent-host ServiceAccount (workload identity / Managed Identity). At run-launch
#     the executor POSTs /configure to the already-warm pod with the run owner's KV secret NAME;
#     the pod fetches ONLY that secret from Key Vault via DefaultAzureCredential and caches it for
#     the pod lifetime. NO CSI volume, NO per-run SecretProviderClass, NO shared RWX token store.
#     HOME points at a writable emptyDir (/home/appuser) for CopilotClient/git.
#
# Pod label `app: agentweaver-sandbox` is intentional: it makes ALL existing sandbox
# NetworkPolicies apply unchanged (ingress 8088 from worker+api, DNS egress, Cilium FQDN
# egress allowlist) — no policy edits, --enable-acns/Cilium policies untouched. The extra
# component label distinguishes agent-host pods for observability. The same NetworkPolicy that
# restricts ingress to worker+api is what guards the unauthenticated /configure endpoint.
#
# Apply (envsubst):
#   ACR_LOGIN_SERVER=agentweaverregistry.azurecr.io AGENTHOST_IMAGE_TAG=be1e28fa \
#     AGENTHOST_KEYVAULT_URI=https://agentweaver-kv.vault.azure.net/ \
#     envsubst < k8s/sandbox-template-agenthost.yaml | kubectl apply -f -
---
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: agentweaver-agent-host
  namespace: agentweaver
  labels:
    app.kubernetes.io/part-of: agentweaver
    app.kubernetes.io/component: agent-host
spec:
  # No env vars are injected via SandboxClaim spec.env — the v0.5.0 controller bypasses warm
  # pool adoption whenever spec.env is present. All static config lives here in the template or
  # in the agenthost-config ConfigMap mount. Per-run context (RunId / UserId / TurnBearerToken /
  # KV secret name) is delivered AFTER bind via POST /configure.
  envVarsInjectionPolicy: Allowed
  podTemplate:
    metadata:
      labels:
        app: agentweaver-sandbox
        app.kubernetes.io/part-of: agentweaver
        app.kubernetes.io/component: agent-host
        # Workload identity webhook mutates the pod (projected SA token + AZURE_* env)
        # so the CSI secrets-store driver can authenticate to Key Vault.
        azure.workload.identity/use: "true"
    spec:
      runtimeClassName: kata-vm-isolation
      # Dedicated kata scheduling (fix/kata-userpool): prefer the fixed kata USER pool
      # (katapool, labeled agentweaver.io/kata=true, tainted sandbox=kata:NoSchedule) so
      # sandbox/agent-host pods stop depending on the System pool (nodepool1). The toleration
      # admits katapool's taint; the nodeAffinity is PREFERRED (not required) so pods fall
      # back to any other kata-capable node (e.g. nodepool1's kata nodes) if katapool is
      # full/unavailable — pods are never stranded.
      tolerations:
        - key: sandbox
          operator: Equal
          value: kata
          effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: agentweaver.io/kata
                    operator: In
                    values:
                      - "true"
      restartPolicy: Never
      serviceAccountName: agentweaver-agent-host
      automountServiceAccountToken: true  # needed for CSI workload identity
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agentweaver-agent-host
          image: ${ACR_LOGIN_SERVER}/agentweaver-agent-host:${AGENTHOST_IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            # PoC: relaxed so CopilotClient/git can write to $HOME. PRODUCTION: set true and
            # add a writable emptyDir at /home/appuser (and keep /tmp writable).
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          # spec-018: A2A listener port (AgentHost:Port). PoC plain-http; prod mTLS.
          ports:
            - name: a2a
              containerPort: 8088
              protocol: TCP
          env:
            # ASP.NET reads config from env + the mounted appsettings.k8s.json (added AFTER
            # env in Program.cs, so the configmap wins for shared keys). Per-run context
            # (RunId/UserId/TurnBearerToken) is delivered via POST /configure; the rest come
            # from the configmap.
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            # Writable HOME on an emptyDir so CopilotClient/git can write (no shared RWX store).
            - name: HOME
              value: "/home/appuser"
            # Option C (warm pool, workload identity): the pod fetches the run owner's GitHub token
            # from Key Vault at /configure-time via DefaultAzureCredential (Managed Identity) — NO CSI
            # volume mount. The KV URI is also injected at claim time; the per-user secret NAME arrives
            # in the /configure POST. ${AGENTHOST_KEYVAULT_URI} is substituted at apply time.
            # Static workspace paths — always /workspace for this deployment.
            # These live here (not in the SandboxClaim) so warm pool adoption is not bypassed.
            - name: AgentHost__WorkingDirectory
              value: "/workspace"
            - name: AgentHost__RepositoryPath
              value: "/workspace"
            - name: AgentHost__KeyVaultUri
              value: "${AGENTHOST_KEYVAULT_URI}"
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: agentweaver-secrets
                  key: appinsights-connection-string
                  optional: true
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
            # Writable HOME (CopilotClient / git config + caches).
            - name: home
              mountPath: /home/appuser
            # Optional in PoC (RequireMtls=false): server TLS cert. Required in production.
            - name: a2a-tls
              mountPath: /mnt/a2a-tls
              readOnly: true
            # AgentHost Kestrel/security config — RequireMtls=false (PoC) lives here.
            - name: agenthost-config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: agentweaver-workspace
        - name: tmp
          emptyDir: {}
        - name: home
          emptyDir: {}
        - name: a2a-tls
          secret:
            secretName: agentweaver-a2a-server-tls
            defaultMode: 0400
            optional: true
        - name: agenthost-config
          configMap:
            name: agenthost-config
