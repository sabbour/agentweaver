apiVersion: batch/v1
kind: CronJob
metadata:
  name: agentweaver-sqlite-backup
  namespace: agentweaver
  labels:
    app.kubernetes.io/part-of: agentweaver
spec:
  schedule: "17 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: agentweaver-sqlite-backup
            app.kubernetes.io/part-of: agentweaver
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
            - name: sqlite-backup
              image: alpine:3.20
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  apk add --no-cache sqlite
                  mkdir -p /data/backups
                  ts="$(date -u +%Y%m%dT%H%M%SZ)"
                  sqlite3 /data/agentweaver.db ".backup '/data/backups/agentweaver-${ts}.db'"
                  find /data/backups -name 'agentweaver-*.db' -mtime +14 -delete
              volumeMounts:
                - name: data
                  mountPath: /data
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: agentweaver-data
