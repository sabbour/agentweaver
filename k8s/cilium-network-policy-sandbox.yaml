apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: sandbox-egress-fqdn-allowlist
  namespace: agentweaver
  labels:
    app.kubernetes.io/part-of: agentweaver
spec:
  endpointSelector:
    matchLabels:
      app: agentweaver-sandbox
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: "api.github.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toFQDNs:
        - matchName: "registry.npmjs.org"
        - matchPattern: "*.npmjs.org"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toFQDNs:
        - matchPattern: "*.services.ai.azure.com"
        - matchPattern: "*.openai.azure.com"
        - matchPattern: "*.cognitiveservices.azure.com"
        - matchPattern: "*.models.ai.azure.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
