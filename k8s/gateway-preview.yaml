# Gateway — wildcard HTTPS entry point for per-preview sandbox browser routes.
#
# A separate Gateway from agentweaver-gateway so the API can dynamically attach
# per-preview HTTPRoute objects without touching the main exact-host Gateway listener.
# GatewayClass is approuting-istio (same add-on as the primary gateway); the add-on
# auto-provisions a per-gateway Deployment + Service named
#   agentweaver-preview-gateway-approuting-istio
# in the same namespace, with pods labelled
#   gateway.networking.k8s.io/gateway-name: agentweaver-preview-gateway
# NetworkPolicy (networkpolicy-sandbox.yaml) allows ingress from exactly those pods.
#
# TLS — CONFIRMED 2026-06-28 by live spike:
#   AKS App Routing DefaultDomainCertificate does NOT support nested wildcards.
#   The DDC CRD has no spec.hostname field; it always issues *.{zone} into the named
#   secret regardless of DDC object name.  Therefore PREVIEW_TLS_SECRET is always
#   "agentweaver-tls" (the existing zone wildcard) and PREVIEW_HOSTNAME is always
#   "*.{zone}".  Preview subdomains take the single-label form {token}-preview.{zone}.
#   (If AKS adds nested DDC support in the future, the deploy script sets these vars
#    and this manifest renders correctly without changes.)
#
# OPEN QUESTION (a) — RESOLVED LOW RISK:
#   approuting-istio accepts multiple Gateway objects per namespace (standard Gateway API).
#   The main gateway uses exact hostname agentweaver.{zone}; this gateway uses *.{zone}.
#   Istio selects the most-specific match (exact > wildcard) so the main host routes
#   correctly. Smoke-test on first deploy to confirm add-on version handles this cleanly.
#
# The deploy script (30-deploy.sh) uses envsubst to render this manifest before applying.
# allowedRoutes: Same — per-preview HTTPRoutes must be in namespace agentweaver.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agentweaver-preview-gateway
  namespace: agentweaver
  labels:
    app.kubernetes.io/part-of: agentweaver
spec:
  gatewayClassName: approuting-istio
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      hostname: "${PREVIEW_HOSTNAME}"
      tls:
        mode: Terminate
        certificateRefs:
          # Managed cert Secret. Currently always agentweaver-tls (*.zone wildcard);
          # set by 30-deploy.sh. Quoted to allow future nested wildcard substitution.
          - kind: Secret
            name: ${PREVIEW_TLS_SECRET}
      allowedRoutes:
        namespaces:
          from: Same
---
# S2 — token confidentiality at the gateway edge.
#
# The preview host is a CAPABILITY URL: the 128-bit token lives in the leftmost DNS label
# ({token}-preview.{zone}) and therefore appears in the HTTP Host header (and, for keepalive,
# the request path). Istio/Envoy access logs would capture Host + path, persisting the secret
# token into log sinks. App code never logs the raw token (it logs only a SHA-256 fingerprint),
# but the data-plane proxy is outside the app's control — so we disable access logging on the
# preview gateway's workload below.
#
# Residual / accepted risk (capability URLs are inherently URL-bearing secrets):
#   * The token is still present in TLS SNI and in the browser/user's own history. This is
#     intrinsic to capability URLs and is mitigated by: short-lived previews (idle + hard-cap
#     reaper), 128-bit entropy (unguessable), and Referrer-Policy: no-referrer on preview pages.
#   * If a future mesh-wide Telemetry default re-enables access logs, this resource still wins
#     for the preview gateway because it is workload-scoped via the selector below.
apiVersion: telemetry.istio.io/v1alpha1
kind: Telemetry
metadata:
  name: agentweaver-preview-gateway-no-accesslog
  namespace: agentweaver
  labels:
    app.kubernetes.io/part-of: agentweaver
spec:
  # Scopes to the preview gateway data-plane pods only (auto-labelled by the approuting-istio
  # add-on), leaving access logging on every other workload untouched.
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: agentweaver-preview-gateway
  accessLogging:
    - disabled: true
