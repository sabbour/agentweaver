# Gateway — wildcard HTTPS entry point for per-preview sandbox browser routes.
#
# A separate Gateway from agentweaver-gateway so the API can dynamically attach
# per-preview HTTPRoute objects without touching the main exact-host Gateway listener.
# GatewayClass is approuting-istio (same add-on as the primary gateway); the add-on
# auto-provisions a per-gateway Deployment + Service named
#   agentweaver-preview-gateway-approuting-istio
# in the same namespace, with pods labelled
#   gateway.networking.k8s.io/gateway-name: agentweaver-preview-gateway
# NetworkPolicy (networkpolicy-sandbox.yaml) allows ingress from exactly those pods.
#
# TLS: Two provisioning paths — the deploy script (30-deploy.sh) probes whether AKS
# App Routing can issue a nested wildcard cert; it sets env vars accordingly:
#
#   Nested cert path (preferred, if *.preview.<zone> DDC becomes Available):
#     PREVIEW_HOSTNAME    = *.preview.<zone>
#     PREVIEW_TLS_SECRET  = agentweaver-preview-tls
#
#   Fallback single-label path (when nested DDC is unsupported or times out):
#     PREVIEW_HOSTNAME    = *.<zone>
#     PREVIEW_TLS_SECRET  = agentweaver-tls  (existing wildcard cert)
#
# OPEN QUESTIONS (see 30-deploy.sh and link-preview-gateway-wiring.md):
#   (a) approuting-istio does accept multiple Gateway objects per namespace (standard
#       Gateway API behaviour). Whether the wildcard listener overlaps the main
#       exact-host listener without conflict depends on listener merging behaviour
#       in the specific Istio release bundled with the add-on. Flag: unconfirmed
#       from repo alone; the non-overlapping fallback is that the main gateway uses
#       an exact hostname and this gateway uses a wildcard, which Istio handles by
#       selecting the more-specific match first — risk is LOW but worth smoke-testing.
#   (b) Whether App Routing can issue a nested *.preview.<zone> DefaultDomainCertificate
#       is UNCONFIRMED. The probe in 30-deploy.sh handles the unsupported case via the
#       fully-wired fallback, so the feature ships regardless.
#
# The deploy script uses envsubst to render this manifest before applying.
# allowedRoutes: Same — per-preview HTTPRoutes must be in namespace agentweaver.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agentweaver-preview-gateway
  namespace: agentweaver
  labels:
    app.kubernetes.io/part-of: agentweaver
spec:
  gatewayClassName: approuting-istio
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      hostname: "${PREVIEW_HOSTNAME}"
      tls:
        mode: Terminate
        certificateRefs:
          # Managed cert Secret — either agentweaver-preview-tls (nested wildcard)
          # or agentweaver-tls (existing zone wildcard, fallback). Resolved at deploy.
          - kind: Secret
            name: ${PREVIEW_TLS_SECRET}
      allowedRoutes:
        namespaces:
          from: Same
