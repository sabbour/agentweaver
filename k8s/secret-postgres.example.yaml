# secret-postgres.example.yaml
#
# Example of the agentweaver-postgres K8s Secret structure.
# Values are environment-variable placeholders — this file is NOT applied directly.
# Actual secret creation is handled by scripts/aks/17-provision-postgres.sh.
#
# To recreate/update the secret manually (e.g. after a password rotation):
#   kubectl create secret generic agentweaver-postgres \
#     --namespace agentweaver \
#     --from-literal=host="agentweaver-pg.postgres.database.azure.com" \
#     --from-literal=port="5432" \
#     --from-literal=database="agentweaver" \
#     --from-literal=username="pgadmin" \
#     --from-literal=password="<new-password>" \
#     --from-literal=connectionstring="Host=agentweaver-pg.postgres.database.azure.com;Port=5432;Database=agentweaver;Username=pgadmin;Password=<new-password>;Ssl Mode=Require;Trust Server Certificate=false" \
#     --save-config --dry-run=client -o yaml | kubectl apply -f -
#
# Connection string config keys consumed by the API:
#   ConnectionStrings:MemoryDb    — current app code (Program.cs:305, GetConnectionString("MemoryDb"))
#   ConnectionStrings:Postgres    — Tank's rename (data-postgres-migration.md §5)
#   Database:Provider             — must be set to "Postgres" to activate the Npgsql provider
#
# HARDENING TODO: Replace password auth with Entra Workload Identity (passwordless):
#   1. az postgres flexible-server ad-admin set ... (set agentweaver-api-identity as Entra admin)
#   2. Grant DB role via pgaadauth to the UAMI principal
#   3. Remove password key from this secret
#   4. Wire Npgsql PeriodicPasswordProvider to exchange the workload-identity SA token
#      for an Entra access token (audience: https://ossrdbms-aad.database.windows.net)
---
apiVersion: v1
kind: Secret
metadata:
  name: agentweaver-postgres
  namespace: agentweaver
  labels:
    app.kubernetes.io/part-of: agentweaver
type: Opaque
stringData:
  host: "${PG_HOST}"
  port: "5432"
  database: "${PG_DB}"
  username: "${PG_ADMIN_USER}"
  password: "${PG_ADMIN_PASSWORD}"
  connectionstring: "Host=${PG_HOST};Port=5432;Database=${PG_DB};Username=${PG_ADMIN_USER};Password=${PG_ADMIN_PASSWORD};Ssl Mode=Require;Trust Server Certificate=false"
