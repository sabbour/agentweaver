apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agentweaver-mcp-route
  namespace: agentweaver
  labels:
    app.kubernetes.io/part-of: agentweaver
spec:
  parentRefs:
    - name: agentweaver-gateway
  hostnames:
    - ${HOST}
  rules:
    - matches:
        - path:
            type: Exact
            value: /mcp/health
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /healthz
      backendRefs:
        - name: agentweaver-mcp
          port: 8080
    # RFC 9728 Protected Resource Metadata — served by the MCP RS, unauthenticated.
    # Both the root and the /mcp-suffixed form are required for Copilot CLI / VS Code
    # compatibility (clients probe the suffixed form per RFC 9728 §4).
    - matches:
        - path:
            type: Exact
            value: /.well-known/oauth-protected-resource
        - path:
            type: Exact
            value: /.well-known/oauth-protected-resource/mcp
      backendRefs:
        - name: agentweaver-mcp
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: agentweaver-mcp
          port: 8080
