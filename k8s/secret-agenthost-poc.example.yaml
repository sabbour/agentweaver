# Secret (EXAMPLE) — PoC GitHub Copilot token for agent-host pods.
#
# spec-018 P1.5 PoC ONLY. The agent-host pod authenticates to GitHub Copilot via the
# config-fallback token Providers:GitHubCopilot:GitHubToken (GitHubCopilotClientFactory ->
# ReadConfigFallbackToken, because PodGitHubTokenStore reports NeverSignedIn). The
# agentweaver-agent-host SandboxTemplate mounts this Secret via `envFrom` (optional:true).
#
# This is a single static token shared by all PoC agent-host pods — acceptable ONLY for a
# controlled single-tenant PoC. PRODUCTION MUST inject a run-scoped token at claim time
# (path 2) or use workload identity so the agent acquires its own token (path 1,
# platform-deployment.md §3.3). Never commit a real token.
#
# Create it imperatively instead of committing a value:
#   kubectl create secret generic agentweaver-agenthost-poc -n agentweaver \
#     --from-literal=Providers__GitHubCopilot__GitHubToken='<PoC-copilot-token>'
#
# Remove it when done:
#   kubectl delete secret agentweaver-agenthost-poc -n agentweaver
---
apiVersion: v1
kind: Secret
metadata:
  name: agentweaver-agenthost-poc
  namespace: agentweaver
  labels:
    app.kubernetes.io/part-of: agentweaver
    app.kubernetes.io/component: agent-host
type: Opaque
stringData:
  # Double underscore = config section separator (Providers:GitHubCopilot:GitHubToken).
  Providers__GitHubCopilot__GitHubToken: "REPLACE_WITH_POC_COPILOT_TOKEN"
