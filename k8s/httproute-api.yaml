# HTTPRoute — routes /api/* to the Agentweaver API service.
#
# All requests with path prefix /api are forwarded to agentweaver-api:8080.
# The API container listens on 8080; no path rewrite is applied so the API
# receives the full /api/... path (consistent with how Vite proxies it in dev).
#
# Request path:
#   Client -> Gateway (agentweaver-gateway) :443, TLS terminated
#       -> HTTPRoute (this) PathPrefix:/api
#       -> agentweaver-api Service :8080
#       -> API pod :8080
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agentweaver-api-route
  namespace: agentweaver
  labels:
    app.kubernetes.io/part-of: agentweaver
spec:
  parentRefs:
    - name: agentweaver-gateway
  hostnames:
    - ${HOST}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
        - path:
            type: PathPrefix
            value: /auth
      backendRefs:
        - name: agentweaver-api
          port: 8080
