apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentweaver-api
  namespace: agentweaver
  labels:
    app: agentweaver-api
    app.kubernetes.io/part-of: agentweaver
spec:
  # Single replica: SQLite is single-writer (RWO PVC). Recreate ensures the old
  # pod releases the disk before the new one attaches (no multi-attach).
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: agentweaver-api
  template:
    metadata:
      labels:
        app: agentweaver-api
        app.kubernetes.io/part-of: agentweaver
        # Required by the Azure Workload Identity webhook to inject the OIDC token volume.
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: agentweaver-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: ${ACR_LOGIN_SERVER}/agentweaver-api:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: Database__Path
              value: /data/agentweaver.db
            - name: Workspace__Path
              value: /workspace
            - name: Auth__GitHub__AllowedOrg
              value: microsoft
            # GitHub Copilot token — sourced from Key Vault via the CSI driver.
            # SecretProviderClass syncs the KV secret into the agentweaver-secrets
            # Kubernetes Secret; the CSI volume mount below triggers that sync.
            - name: Providers__GitHubCopilot__GitHubToken
              valueFrom:
                secretKeyRef:
                  name: agentweaver-secrets
                  key: github-copilot-token
          volumeMounts:
            - name: data
              mountPath: /data
            - name: workspace
              mountPath: /workspace
            # CSI mount triggers the SecretProviderClass to sync the Key Vault secret
            # into the agentweaver-secrets Kubernetes Secret used by the env var above.
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /api/diagnostics/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/diagnostics/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: agentweaver-data
        - name: workspace
          persistentVolumeClaim:
            claimName: agentweaver-workspace
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: agentweaver-secrets
