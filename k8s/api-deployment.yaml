apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentweaver-api
  namespace: agentweaver
  labels:
    app: agentweaver-api
    app.kubernetes.io/part-of: agentweaver
spec:
  # spec-018 P2 cutover: Postgres primary. RWX workspace (/workspace/.home) replaces RWO data PVC.
  # Recreate → RollingUpdate now that SQLite single-writer constraint is lifted.
  # replicas:2 — both pods land on different nodes; RWX Azure Files allows multi-node mount.
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: agentweaver-api
  template:
    metadata:
      labels:
        app: agentweaver-api
        app.kubernetes.io/part-of: agentweaver
        # Required by the Azure Workload Identity webhook to inject the OIDC token volume.
        azure.workload.identity/use: "true"
      annotations:
        secrets-store.csi.k8s.io/rotation-poll-interval: "2m"
    spec:
      serviceAccountName: agentweaver-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: migrate-memory-db
          image: ${ACR_LOGIN_SERVER}/agentweaver-api:${IMAGE_TAG}
          imagePullPolicy: Always
          command:
            - /app/efbundle
            - --verbose
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            # spec-018 P2: HOME on /tmp; no agentweaver-data PVC in Postgres mode.
            - name: HOME
              value: /tmp
            - name: TMPDIR
              value: /tmp
            - name: DOTNET_BUNDLE_EXTRACT_BASE_DIR
              value: /tmp/.net
            # EF design-time host build runs Program.Main, which trips OAuthConfigGuard.
            # Pin Issuer/Audience here too so `efbundle` migrations pass the Production guard.
            - name: Auth__OAuth__Issuer
              value: https://${HOST}
            - name: Auth__OAuth__Audience
              value: https://${HOST}/mcp
            # spec-018 P2: run efbundle against Postgres.
            - name: Database__Provider
              value: "Postgres"
            - name: ConnectionStrings__MemoryDb
              valueFrom:
                secretKeyRef:
                  name: agentweaver-postgres
                  key: connectionstring
            - name: ConnectionStrings__Postgres
              valueFrom:
                secretKeyRef:
                  name: agentweaver-postgres
                  key: connectionstring
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      containers:
        - name: api
          image: ${ACR_LOGIN_SERVER}/agentweaver-api:${IMAGE_TAG}
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              export Auth__ApiKey="$(cat /mnt/secrets-store/mcp-api-key)"
              export Mcp__ApiKey="${Auth__ApiKey}"
              export GitHub__ClientId="$(cat /mnt/secrets-store/github-client-id)"
              export GitHub__ClientSecret="$(cat /mnt/secrets-store/github-client-secret)"
              export Auth__GitHub__ClientId="${GitHub__ClientId}"
              export Auth__GitHub__ClientSecret="${GitHub__ClientSecret}"
              export Auth__OAuth__SigningKey="$(cat /mnt/secrets-store/mcp-oauth-signing-key)"
              exec dotnet Agentweaver.Api.dll
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            # spec-018 P2: HOME on RWX workspace/.home — shared across all replicas + worker.
            # AppPaths.DataDirectory → $HOME/.local/share/agentweaver (token store, checkpoints, worktrees).
            # /workspace is RWX (Azure Files); agentweaver-data RWO PVC is dropped.
            - name: HOME
              value: /workspace/.home
            # SQLite path kept for reference; unused when Database__Provider=Postgres.
            - name: Database__Path
              value: /tmp/agentweaver.db
            - name: Workspace__Path
              value: /workspace
            # In-process loopback base URL for agent decision/memory/inbox tools and Scribe.
            # The API binds 8080 (ASPNETCORE_URLS); without this they default to the dead :5000
            # port → connection refused → "Tool execution failed". Explicit override of the
            # code-level binding-derivation fallback.
            - name: Agentweaver__ApiBaseUrl
              value: http://localhost:8080
            - name: Workspace__Provider
              value: persistent-volume
            - name: Workspace__PersistentVolume__MountRoot
              value: /workspace
            - name: Sandbox__Backend
              value: kubernetes
            - name: Sandbox__Kubernetes__Namespace
              value: agentweaver
            - name: Sandbox__Kubernetes__TemplateRef
              value: agentweaver-sandbox
            # spec-018 P1.5 live flip: execute agent turns inside a per-run AgentHost
            # sandbox pod over the A2A bridge (default in-api). RequireMtls=false is the
            # PoC plain-http path; the pod reads the shared RWX token store (UseSharedTokenStore).
            - name: Sandbox__AgentExecutionMode
              value: pod-per-run
            - name: Sandbox__AgentHost__RequireMtls
              value: "false"
            - name: Auth__User
              value: agentweaver-mcp
            - name: Auth__GitHub__AllowedOrg
              value: microsoft
            - name: Auth__GitHub__CallbackUrl
              value: https://${HOST}/auth/github/callback
            - name: Auth__GitHub__FrontendUrl
              value: https://${HOST}/
            # OAuth 2.1 Authorization Server config (RFC 8414 / RFC 9728)
            # Issuer must match the public host so iss claim == AS metadata URL.
            - name: Auth__OAuth__Issuer
              value: https://${HOST}
            # Audience bound to the MCP resource (RFC 8707); RS validates aud on every request.
            - name: Auth__OAuth__Audience
              value: https://${HOST}/mcp
            # Backward-compat: allow raw GitHub tokens while clients migrate to the new flow.
            # Flip to "false" once all MCP clients are using Agentweaver-minted tokens.
            - name: Auth__Mcp__AllowGitHubPassthrough
              value: "true"
            # GitHub token store — persists per-user OAuth tokens in Key Vault so the
            # API can exchange them for on-behalf-of calls (spec 006).
            # Requires "Key Vault Secrets Officer" on agentweaver-api-identity
            # (granted by scripts/aks/15-setup-identity.sh).
            # WorkloadIdentityCredential resolves automatically from the webhook-injected
            # AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_FEDERATED_TOKEN_FILE env vars.
            - name: Auth__TokenStore__Provider
              value: keyvault
            - name: Auth__TokenStore__KeyVaultUri
              value: https://${KEYVAULT_NAME}.vault.azure.net
            - name: OTEL_SERVICE_NAME
              value: agentweaver-api
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=agentweaver,deployment.environment=production
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: TMPDIR
              value: /tmp
            # H1 (spec-018): paths for worker mTLS client cert used by RemoteAgentProxy
            # when dialing the AgentHost A2A endpoint.  Morpheus wires these into
            # the HttpClientHandler that backs the A2AAgent / IA2AClient.
            - name: Sandbox__A2A__ClientCertPath
              value: /mnt/a2a-client-tls/tls.crt
            - name: Sandbox__A2A__ClientKeyPath
              value: /mnt/a2a-client-tls/tls.key
            - name: Sandbox__A2A__CACertPath
              value: /mnt/a2a-client-tls/ca.crt
            # H4: A2A port — must match the Kestrel endpoint in configmap-agenthost.yaml.
            - name: Sandbox__A2A__Port
              value: "8088"
            # Preview gateway wiring — values resolved at deploy time by 30-deploy.sh.
            # ZoneSuffix is either "preview.<zone>" (nested wildcard cert) or "<zone>" (fallback).
            # GatewayName/GatewayNamespace are static; only Enabled+ZoneSuffix are templated.
            - name: Sandbox__Preview__Enabled
              value: "${SANDBOX_PREVIEW_ENABLED}"
            - name: Sandbox__Preview__ZoneSuffix
              value: "${SANDBOX_PREVIEW_ZONE_SUFFIX}"
            - name: Sandbox__Preview__GatewayName
              value: "agentweaver-preview-gateway"
            - name: Sandbox__Preview__GatewayNamespace
              value: "agentweaver"
            # spec-018 P2: Postgres primary — flip from sqlite.
            - name: Database__Provider
              value: "Postgres"
            - name: ConnectionStrings__MemoryDb
              valueFrom:
                secretKeyRef:
                  name: agentweaver-postgres
                  key: connectionstring
            - name: ConnectionStrings__Postgres
              valueFrom:
                secretKeyRef:
                  name: agentweaver-postgres
                  key: connectionstring
          volumeMounts:
            # spec-018 P2: agentweaver-data RWO PVC dropped. /workspace RWX is primary.
            # HOME=/workspace/.home gives token store + worktrees on shared RWX volume.
            - name: workspace
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /app/logs
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
            # H1 (spec-018): worker mTLS client cert + CA cert for A2A transport.
            # RemoteAgentProxy must load tls.crt / tls.key as the client certificate
            # and ca.crt as the trust anchor when dialing the AgentHost A2A endpoint.
            - name: a2a-client-tls
              mountPath: /mnt/a2a-client-tls
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /api/ping
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      # spec-018 P2: agentweaver-data volume removed; Postgres is primary data store.
      # The PVC is retained (not deleted) as a safety net for emergency SQLite rollback.
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: agentweaver-workspace
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: agentweaver-secrets
        # H1 (spec-018): worker mTLS client cert for A2A transport (spec-018).
        # Secret created by scripts/aks/gen-a2a-mtls-certs.sh.
        - name: a2a-client-tls
          secret:
            secretName: agentweaver-a2a-client-tls
            defaultMode: 0400
