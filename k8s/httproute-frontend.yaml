# HTTPRoute — routes / (catch-all) to the Agentweaver Frontend service.
#
# All requests not matched by a more specific route (i.e., not /api/*) are
# forwarded to agentweaver-frontend:80. The frontend nginx container serves
# the React SPA with a fallback to index.html for client-side routing.
#
# This route is intentionally lower priority than httproute-api.yaml because
# Gateway API evaluates routes by specificity (longer prefix wins).
#
# Request path:
#   Client -> Gateway (agentweaver-gateway) :443, TLS terminated
#       -> HTTPRoute (this) PathPrefix:/
#       -> agentweaver-frontend Service :80
#       -> nginx pod :80 (serves static SPA assets)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agentweaver-frontend-route
  namespace: agentweaver
  labels:
    app.kubernetes.io/part-of: agentweaver
spec:
  parentRefs:
    - name: agentweaver-gateway
  hostnames:
    - ${HOST}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: agentweaver-frontend
          port: 80
