apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentweaver-agent-host
  namespace: agentweaver
  annotations:
    # Populated by 15-setup-identity.sh; substitute with envsubst before applying.
    # Reuses the SAME managed identity as agentweaver-api (already has Key Vault
    # get-secret access), so no new Key Vault access policy is required.
    azure.workload.identity/client-id: "${IDENTITY_CLIENT_ID}"
    # Required so the workload-identity webhook injects AZURE_TENANT_ID into the
    # pod, enabling the CSI secrets-store driver to authenticate to Key Vault and
    # mount the run-scoped user-token SecretProviderClass.
    azure.workload.identity/tenant-id: "${TENANT_ID}"
  labels:
    app.kubernetes.io/part-of: agentweaver
