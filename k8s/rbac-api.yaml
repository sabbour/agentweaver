apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentweaver-api-sandbox
  namespace: agentweaver
  labels:
    app.kubernetes.io/part-of: agentweaver
rules:
  - apiGroups:
      - extensions.agents.x-k8s.io
    resources:
      - sandboxclaims
    verbs:
      - get
      - list
      - create
      - delete
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - create
      - patch
  - apiGroups:
      - ""
    resources:
      - pods/exec
    verbs:
      - create
  # Dynamic per-preview Service objects — created/deleted by the API sandbox preview manager.
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
      - list
      - create
      - delete
      - patch
      - update
  # Dynamic per-preview HTTPRoute objects — created/deleted by the API sandbox preview manager.
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - httproutes
    verbs:
      - get
      - list
      - create
      - delete
      - patch
      - update
  # SecretProviderClass CRDs — the API patches agentweaver-user-tokens on user sign-in
  # to add/remove per-user GitHub token objects mounted into agent-host pods via CSI.
  - apiGroups:
      - secrets-store.csi.x-k8s.io
    resources:
      - secretproviderclasses
    verbs:
      - get
      - patch
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentweaver-api-sandbox
  namespace: agentweaver
  labels:
    app.kubernetes.io/part-of: agentweaver
subjects:
  - kind: ServiceAccount
    name: agentweaver-api
    namespace: agentweaver
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agentweaver-api-sandbox
