apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-gateway-to-frontend
  namespace: agentweaver
spec:
  selector:
    matchLabels:
      app: agentweaver-frontend
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/app-routing-system/sa/approuting-istio-gateway"]
