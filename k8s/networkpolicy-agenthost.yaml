# NetworkPolicy — A2A ingress to AgentHost (sandbox) pods.
#
# H2 (spec-018): scoped INGRESS to agentweaver-sandbox pods on ONLY the A2A
# port (8088), from the worker and API pods — label-selector scoped.
# No other source may reach the A2A listener.
#
# Sources:
#   - agentweaver-worker: primary dispatcher (worker role owns RunWatchLoopService +
#     KubernetesSandboxExecutor — calls sandbox agent pods over A2A mTLS after claiming a run)
#   - agentweaver-api: fallback dispatcher (in-api / default mode where the web pod
#     runs the orchestration loop directly — keeps working during Postgres cutover and
#     as a rollback path per platform-deployment.md §5 rollback note)
#
# Relationship to existing policies:
#   - networkpolicy-sandbox.yaml `sandbox-deny-ingress` provides the default
#     deny for ingress.  Kubernetes NetworkPolicy is additive: this file adds
#     the sole permitted exception without touching or removing that policy.
#   - Egress policies in networkpolicy-sandbox.yaml and
#     cilium-network-policy-sandbox.yaml are NOT modified (H6 preserved).
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-worker-to-agenthost-a2a
  namespace: agentweaver
  labels:
    app.kubernetes.io/part-of: agentweaver
spec:
  # Target: sandbox / AgentHost pods only.
  podSelector:
    matchLabels:
      app: agentweaver-sandbox
  policyTypes:
    - Ingress
  ingress:
    - from:
        # agentweaver-worker: primary A2A caller (spec-018 P3 worker role).
        - podSelector:
            matchLabels:
              app: agentweaver-worker
        # agentweaver-api: retained for in-api/default dispatch mode and rollback.
        - podSelector:
            matchLabels:
              app: agentweaver-api
      ports:
        # A2A HTTPS/mTLS listener only.  No other port is opened.
        - protocol: TCP
          port: 8088
