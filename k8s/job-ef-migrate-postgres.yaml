apiVersion: batch/v1
kind: Job
metadata:
  name: ef-migrate-postgres
  namespace: agentweaver
  labels:
    app.kubernetes.io/part-of: agentweaver
    spec018: c2-ef-migrations
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: ef-migrate-postgres
        app.kubernetes.io/part-of: agentweaver
    spec:
      restartPolicy: Never
      serviceAccountName: agentweaver-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: ef-migrate
          image: agentweaverregistry.azurecr.io/agentweaver-api:92e4d74c
          imagePullPolicy: Always
          command:
            - /app/efbundle
            - --verbose
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: HOME
              value: /tmp
            - name: TMPDIR
              value: /tmp
            - name: DOTNET_BUNDLE_EXTRACT_BASE_DIR
              value: /tmp/.net
            # Auth guard requires Issuer + Audience even for migration runs
            - name: Auth__OAuth__Issuer
              value: "https://agentweaver.6a3de4fe60529400010f3fba.westus2.staging.aksapp.io"
            - name: Auth__OAuth__Audience
              value: "https://agentweaver.6a3de4fe60529400010f3fba.westus2.staging.aksapp.io/mcp"
            # Use Postgres provider + connection string from secret
            - name: Database__Provider
              value: "Postgres"
            - name: ConnectionStrings__Postgres
              valueFrom:
                secretKeyRef:
                  name: agentweaver-postgres
                  key: connectionstring
            - name: ConnectionStrings__MemoryDb
              valueFrom:
                secretKeyRef:
                  name: agentweaver-postgres
                  key: connectionstring
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
