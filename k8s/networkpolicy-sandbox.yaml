# NetworkPolicy for Agentweaver sandbox pods (label: app: agentweaver-sandbox).
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-deny-ingress
  namespace: agentweaver
  labels:
    app.kubernetes.io/part-of: agentweaver
spec:
  podSelector:
    matchLabels:
      app: agentweaver-sandbox
  policyTypes:
    - Ingress
---
# Allow the Istio ingress data-plane (preview gateway) to reach the sandbox browser preview port range.
#
# Ports 3000-9000 are the allowed sandbox dev-server preview ports. This range MUST mirror
# Sandbox:Preview:AllowedPortMin/Max (the preview endpoint rejects out-of-range target_port,
# so we never provision a preview the NetworkPolicy would black-hole). target_port is
# user-supplied (default 3000) — coordinate with Morpheus (backend) before changing the range.
#
# The approuting-istio add-on creates the preview gateway's data-plane pods in the SAME namespace
# as this policy (agentweaver) — CONFIRMED on the live cluster (agentweaver-aks-2). They are
# labelled gateway.networking.k8s.io/gateway-name: agentweaver-preview-gateway.
#
# A NetworkPolicy `from` peer with only a podSelector (and NO namespaceSelector) matches pods
# carrying that label in the SAME namespace as the policy (agentweaver) — exactly where the
# preview-gateway pods run. The gateway-name label scopes ingress to ONLY the preview gateway's
# pods, which is tight and correct. (An earlier revision required namespaceSelector
# aks-istio-ingress; that was wrong for this add-on topology and would have black-holed all
# preview traffic, since the gateway pods are not in aks-istio-ingress.)
#
# Egress is NOT touched — all egress rules remain in sandbox-egress-allowlist below.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-allow-preview-ingress
  namespace: agentweaver
  labels:
    app.kubernetes.io/part-of: agentweaver
spec:
  podSelector:
    matchLabels:
      app: agentweaver-sandbox
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Same-namespace (agentweaver) podSelector only — admits only the preview gateway
        # data-plane pods. No namespaceSelector: the gateway pods live in this namespace.
        - podSelector:
            matchLabels:
              gateway.networking.k8s.io/gateway-name: agentweaver-preview-gateway
      ports:
        # Range mirrors Sandbox:Preview:AllowedPortMin/Max (gateway-sourced ingress only).
        - protocol: TCP
          port: 3000
          endPort: 9000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-egress-allowlist
  namespace: agentweaver
  labels:
    app.kubernetes.io/part-of: agentweaver
spec:
  podSelector:
    matchLabels:
      app: agentweaver-sandbox
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # GitHub API public range. Service/pod CIDRs are not included in this allowlist.
    - to:
        - ipBlock:
            cidr: 140.82.112.0/20
      ports:
        - protocol: TCP
          port: 443
