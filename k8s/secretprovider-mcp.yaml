apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: agentweaver-mcp-secrets
  namespace: agentweaver
  annotations:
    secrets-store.csi.k8s.io/rotation-poll-interval: "2m"
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "${IDENTITY_CLIENT_ID}"
    keyvaultName: "${KEYVAULT_NAME}"
    tenantId: "${TENANT_ID}"
    objects: |
      array:
        - |
          objectName: mcp-api-key
          objectType: secret
        - |
          objectName: mcp-auth-api-key
          objectType: secret
        - |
          objectName: mcp-auth-user
          objectType: secret
  secretObjects:
    - secretName: agentweaver-mcp-secrets
      type: Opaque
      data:
        - objectName: mcp-api-key
          key: mcp-api-key
        - objectName: mcp-auth-api-key
          key: mcp-auth-api-key
        - objectName: mcp-auth-user
          key: mcp-auth-user
