apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: agentweaver-secrets
  namespace: agentweaver
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    # Populated by 15-setup-identity.sh; substitute with envsubst before applying.
    clientID: "${IDENTITY_CLIENT_ID}"
    keyvaultName: "${KEYVAULT_NAME}"
    tenantId: "${TENANT_ID}"
    objects: |
      array:
        - |
          objectName: github-copilot-token
          objectType: secret
  # Sync the Key Vault secret into a Kubernetes Secret so the pod can consume it
  # via secretKeyRef without needing a volume mount in application code.
  secretObjects:
    - secretName: agentweaver-secrets
      type: Opaque
      data:
        - objectName: github-copilot-token
          key: github-copilot-token
