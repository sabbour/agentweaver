apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: agentweaver-secrets
  namespace: agentweaver
  annotations:
    secrets-store.csi.k8s.io/rotation-poll-interval: "2m"
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "${IDENTITY_CLIENT_ID}"
    keyvaultName: "${KEYVAULT_NAME}"
    tenantId: "${TENANT_ID}"
    objects: |
      array:
        - |
          objectName: github-client-id
          objectType: secret
        - |
          objectName: github-client-secret
          objectType: secret
        - |
          objectName: mcp-oauth-signing-key
          objectType: secret
  secretObjects:
    - secretName: agentweaver-secrets
      type: Opaque
      data:
        - objectName: github-client-id
          key: github-client-id
        - objectName: github-client-secret
          key: github-client-secret
        - objectName: mcp-oauth-signing-key
          key: mcp-oauth-signing-key
---
# Base AgentHost token SPC. Keep this committed manifest installation-only: the API creates a
# per-run SecretProviderClass for each AgentHost pod containing only that run owner's
# ghtok-user--{base32(userId)} entry, then points a run-scoped SandboxTemplate at it.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: agentweaver-user-tokens
  namespace: agentweaver
  annotations:
    secrets-store.csi.k8s.io/rotation-poll-interval: "2m"
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "${IDENTITY_CLIENT_ID}"
    keyvaultName: "${KEYVAULT_NAME}"
    tenantId: "${TENANT_ID}"
    objects: |
      array:
        - |
          objectName: ghtok-installation
          objectType: secret
  secretObjects:
    - secretName: agentweaver-user-tokens
      type: Opaque
      data:
        - objectName: ghtok-installation
          key: installation.json
