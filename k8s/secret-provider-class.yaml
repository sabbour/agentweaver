apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: agentweaver-secrets
  namespace: agentweaver
  annotations:
    secrets-store.csi.k8s.io/rotation-poll-interval: "2m"
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "${IDENTITY_CLIENT_ID}"
    keyvaultName: "${KEYVAULT_NAME}"
    tenantId: "${TENANT_ID}"
    objects: |
      array:
        - |
          objectName: mcp-api-key
          objectType: secret
        - |
          objectName: github-client-id
          objectType: secret
        - |
          objectName: github-client-secret
          objectType: secret
        - |
          objectName: mcp-oauth-signing-key
          objectType: secret
  secretObjects:
    - secretName: agentweaver-secrets
      type: Opaque
      data:
        - objectName: mcp-api-key
          key: mcp-api-key
        - objectName: github-client-id
          key: github-client-id
        - objectName: github-client-secret
          key: github-client-secret
        - objectName: mcp-oauth-signing-key
          key: mcp-oauth-signing-key
---
# User GitHub tokens mounted into agent-host pods. The API dynamically patches this
# SPC on user sign-in to add per-user objects (ghtok-user-<id> -> user_<id>.json).
# Starts with only the installation token so the SPC is valid at deploy time.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: agentweaver-user-tokens
  namespace: agentweaver
  annotations:
    secrets-store.csi.k8s.io/rotation-poll-interval: "2m"
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "${IDENTITY_CLIENT_ID}"
    keyvaultName: "${KEYVAULT_NAME}"
    tenantId: "${TENANT_ID}"
    objects: |
      array:
        - |
          objectName: ghtok-installation
          objectType: secret
  secretObjects:
    - secretName: agentweaver-user-tokens
      type: Opaque
      data:
        - objectName: ghtok-installation
          key: installation.json
