apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: agentweaver-secrets
  namespace: agentweaver
  annotations:
    secrets-store.csi.k8s.io/rotation-poll-interval: "2m"
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "${IDENTITY_CLIENT_ID}"
    keyvaultName: "${KEYVAULT_NAME}"
    tenantId: "${TENANT_ID}"
    objects: |
      array:
        - |
          objectName: mcp-api-key
          objectType: secret
        - |
          objectName: github-client-id
          objectType: secret
        - |
          objectName: github-client-secret
          objectType: secret
  secretObjects:
    - secretName: agentweaver-secrets
      type: Opaque
      data:
        - objectName: mcp-api-key
          key: mcp-api-key
        - objectName: github-client-id
          key: github-client-id
        - objectName: github-client-secret
          key: github-client-secret
