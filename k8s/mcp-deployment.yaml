apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentweaver-mcp
  namespace: agentweaver
  labels:
    app: agentweaver-mcp
    app.kubernetes.io/part-of: agentweaver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentweaver-mcp
  template:
    metadata:
      labels:
        app: agentweaver-mcp
        app.kubernetes.io/part-of: agentweaver
        azure.workload.identity/use: "true"
      annotations:
        secrets-store.csi.k8s.io/rotation-poll-interval: "2m"
    spec:
      serviceAccountName: agentweaver-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: mcp
          image: ${ACR_LOGIN_SERVER}/agentweaver-mcp:${IMAGE_TAG}
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              export AGENTWEAVER_API_KEY="$(cat /mnt/secrets-store/mcp-api-key)"
              export Auth__ApiKey="$(cat /mnt/secrets-store/mcp-auth-api-key)"
              export Auth__User="$(cat /mnt/secrets-store/mcp-auth-user)"
              exec dotnet Agentweaver.Mcp.dll
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: AGENTWEAVER_API_URL
              value: http://agentweaver-api:8080
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: agentweaver-mcp-secrets
