apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: agentweaver-sandbox
  namespace: agentweaver
  labels:
    app.kubernetes.io/part-of: agentweaver
spec:
  envVarsInjectionPolicy: Disallowed
  podTemplate:
    metadata:
      labels:
        app: agentweaver-sandbox
        app.kubernetes.io/part-of: agentweaver
    spec:
      runtimeClassName: kata-vm-isolation
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agentweaver-sandbox
          image: ${ACR_LOGIN_SERVER}/agentweaver-sandbox:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          # H1/H4 (spec-018): A2A HTTPS listener port.
          ports:
            - name: a2a
              containerPort: 8088
              protocol: TCP
          resources:
            # Raised from 250m/256Mi — the pod now hosts a live A2A agent runtime,
            # not sleep infinity.  Final sizing is an open question (§3.1 platform-deployment.md).
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
            # H1 (spec-018): workload-bound server TLS cert + CA cert for mTLS.
            # Mounted read-only; readOnlyRootFilesystem is already enforced.
            - name: a2a-tls
              mountPath: /mnt/a2a-tls
              readOnly: true
            # H4 (spec-018): Kestrel/security configuration (configmap-agenthost.yaml).
            # Morpheus must call builder.Configuration.AddJsonFile("/app/config/appsettings.k8s.json").
            - name: agenthost-config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: agentweaver-workspace
        - name: tmp
          emptyDir: {}
        # H1: workload-bound server cert secret (created by gen-a2a-mtls-certs.sh).
        - name: a2a-tls
          secret:
            secretName: agentweaver-a2a-server-tls
            defaultMode: 0400
        # H4/H3: Kestrel + card-authz configuration.
        - name: agenthost-config
          configMap:
            name: agenthost-config
