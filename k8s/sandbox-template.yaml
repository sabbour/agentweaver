apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: agentweaver-sandbox
  namespace: agentweaver
  labels:
    app.kubernetes.io/part-of: agentweaver
spec:
  envVarsInjectionPolicy: Disallowed
  podTemplate:
    metadata:
      labels:
        app: agentweaver-sandbox
        app.kubernetes.io/part-of: agentweaver
    spec:
      runtimeClassName: kata-vm-isolation
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agentweaver-sandbox
          image: ${ACR_LOGIN_SERVER}/agentweaver-sandbox:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "4Gi"
              cpu: "1000m"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: agentweaver-workspace
        - name: tmp
          emptyDir: {}
