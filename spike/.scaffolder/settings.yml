# .scaffolder/settings.yml
# Project-level configuration for Scaffolder. Each top-level key is a settings group.
# Add new groups under their own key — existing groups are not affected.

sandbox:
  shell_enabled: false
  allowed_repository_roots: []
  destructive_command_patterns:
    - rm -rf
    - del /s
    - "format "
    - mkfs
    - dd if=
    - git push --force
    - git reset --hard
  require_approval_for_all_shell: false
  redact_pii: true
  max_output_bytes: 4194304

# Future setting groups can be added here, e.g.:
# review:
#   require_approval: true
# agents:
#   max_turns: 30
