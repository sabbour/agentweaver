name: Spike / research
description: Timebox research, discovery, or prototyping.
title: "spike(<area>): "
labels:
  - type:spike
  - release:backlog
body:
  - type: textarea
    id: research-question
    attributes:
      label: Research question
      description: What do we need to learn or decide?
    validations:
      required: true
  - type: textarea
    id: desired-outcome
    attributes:
      label: Desired outcome
      description: Decision, recommendation, or prototype; not a shipped feature.
    validations:
      required: true
  - type: input
    id: timebox
    attributes:
      label: Timebox
      description: For example, "1 day" or "4h".
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: Optional boundaries for the spike.
  - type: textarea
    id: affected-area
    attributes:
      label: Affected area
      description: Optional product area, files, directories, or components.
